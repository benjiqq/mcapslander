<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[MCAPS] — Financial Infrastructure. Rebuilt from Zero.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --navy:#020b1a;
      --accent:#00c2ff;
      --accent-dim:rgba(0,194,255,0.08);
      --accent-line:rgba(0,194,255,0.18);
      --white:#e4eaf2;
      --muted:rgba(228,234,242,0.38);
      --dim:rgba(228,234,242,0.13);
      --vdim:rgba(228,234,242,0.05);
    }
    html,body{height:100%;background:#020b1a;}
    .root{
      background:#020b1a;
      color:var(--white);
      font-family:'Courier Prime',monospace;
      min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      position:relative;overflow:hidden;padding:2rem;
    }
    .top-bar{
      position:fixed;top:0;left:0;right:0;height:1px;z-index:20;
      background:linear-gradient(90deg,transparent,rgba(0,194,255,0.3) 25%,#00c2ff 50%,rgba(0,194,255,0.3) 75%,transparent);
    }
    canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
    .glow{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      width:700px;height:500px;
      background:radial-gradient(ellipse,rgba(0,70,160,0.1) 0%,transparent 65%);
      pointer-events:none;z-index:0;
    }
    .card{
      position:relative;z-index:10;
      max-width:480px;width:100%;
      text-align:center;display:flex;flex-direction:column;align-items:center;
    }
    .logo{font-size:22px;font-weight:700;color:#e4eaf2;margin-bottom:4rem;animation:up 0.7s ease both;}
    .logo .br{color:#00c2ff;font-weight:400;font-size:1.1em;}
    h1{
      font-size:clamp(30px,6.5vw,54px);font-weight:700;line-height:1.02;
      letter-spacing:-0.03em;color:#e4eaf2;margin-bottom:1rem;
      animation:up 0.7s ease 0.12s both;
    }
    h1 em{font-style:normal;color:#00c2ff;}
    .divline{width:32px;height:1px;background:rgba(0,194,255,0.25);margin:1.25rem auto;animation:up 0.7s ease 0.2s both;}
    .sub{
      font-size:11px;line-height:2;color:rgba(228,234,242,0.42);letter-spacing:0.06em;
      margin-bottom:3rem;animation:up 0.7s ease 0.26s both;
    }
    .actions{
      display:flex;flex-direction:column;align-items:stretch;gap:10px;
      width:100%;max-width:340px;animation:up 0.7s ease 0.36s both;
    }
    .btn-x{
      display:flex;align-items:center;justify-content:center;gap:12px;
      width:100%;padding:14px 20px;
      background:#ffffff;color:#000000;border:none;
      font-family:'Courier Prime',monospace;font-size:12px;font-weight:700;
      letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;
      border-radius:2px;transition:background 0.15s;
    }
    .btn-x:hover{background:#d0e8f5;}
    .sep{display:flex;align-items:center;gap:10px;}
    .sep-line{flex:1;height:0.5px;background:rgba(228,234,242,0.06);}
    .sep-txt{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(228,234,242,0.14);}
    .form-row{
      display:flex;gap:0;
      border:0.5px solid rgba(0,194,255,0.2);overflow:hidden;border-radius:2px;
    }
    input[type=email]{
      flex:1;background:rgba(0,194,255,0.07);border:none;
      padding:13px 12px;font-family:'Courier Prime',monospace;font-size:11px;
      color:#e4eaf2;outline:none;letter-spacing:0.04em;
    }
    input[type=email]::placeholder{color:rgba(228,234,242,0.2);}
    .btn-email{
      background:#00c2ff;color:#020b1a;border:none;
      padding:13px 16px;
      font-family:'Courier Prime',monospace;font-size:9px;font-weight:700;
      letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;white-space:nowrap;
    }
    .btn-email:hover{background:#33cfff;}
    .note{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(228,234,242,0.14);}
    .thanks{display:none;font-size:12px;color:#00c2ff;letter-spacing:0.1em;padding:4px 0;}
    .foot{
      position:fixed;bottom:1.5rem;left:0;right:0;z-index:10;
      display:flex;align-items:center;justify-content:center;gap:1.5rem;
    }
    .foot span{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(228,234,242,0.13);}
    @keyframes up{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>
  <div class="root">
    <div class="top-bar"></div>
    <canvas id="c"></canvas>
    <div class="glow"></div>

    <div class="card">
      <div class="logo"><span class="br">[</span>MCAPS<span class="br">]</span></div>

      <h1>The system was never<br>designed for <em>you.</em><br>This one is.</h1>
      <div class="divline"></div>
      <p class="sub">Financial infrastructure.<br>Rebuilt from zero.</p>

      <div class="actions">

        <button class="btn-x" onclick="window.open('https://x.com/intent/follow?screen_name=mcaps','_blank')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#000000" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
          Join waitlist with X
        </button>

        <div class="sep">
          <div class="sep-line"></div>
          <span class="sep-txt">or</span>
          <div class="sep-line"></div>
        </div>

        <div class="form-row" id="form-row">
          <input type="email" id="email" placeholder="your@email.com" />
          <button class="btn-email" onclick="go()">Notify me</button>
        </div>
        <div class="thanks" id="thanks">You're in. Stand by.</div>
        <div class="note" id="note">Signal only. No noise.</div>

      </div>
    </div>

    <div class="foot">
      <span>mcaps.com</span><span>·</span><span>Est. 2026</span><span>·</span><span>Disrupting finance</span>
    </div>
  </div>

  <script>
    function go(){
      const e=document.getElementById('email');
      if(!e.value||!e.value.includes('@'))return;
      document.getElementById('form-row').style.display='none';
      document.getElementById('note').style.display='none';
      document.getElementById('thanks').style.display='block';
    }
    (function(){
      const c=document.getElementById('c');
      const ctx=c.getContext('2d');
      let W,H,pts=[];
      function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
      function init(){
        pts=[];
        for(let i=0;i<80;i++)pts.push({
          x:Math.random()*W,y:Math.random()*H,
          r:Math.random()*0.65+0.15,
          speed:Math.random()*0.004+0.001,
          phase:Math.random()*Math.PI*2
        });
      }
      function draw(t){
        ctx.clearRect(0,0,W,H);
        pts.forEach(p=>{
          const a=(Math.sin(t*p.speed+p.phase)*0.4+0.5)*0.32;
          ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx.fillStyle=`rgba(0,194,255,${a})`;ctx.fill();
        });
        ctx.strokeStyle='rgba(0,194,255,0.035)';ctx.lineWidth=0.5;
        for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
          const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
          if(dx*dx+dy*dy<8000){
            ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);
            ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();
          }
        }
        requestAnimationFrame(draw);
      }
      resize();init();requestAnimationFrame(draw);
      window.addEventListener('resize',()=>{resize();init();});
    })();
  </script>
</body>
</html>
